spring.application.name=car_rental_management
server.port=8081
spring.datasource.url=jdbc:mysql://localhost:3306/FuCarRentalSystem
spring.datasource.username=root
spring.datasource.password=tommy160105
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configure SQL initialization - runs schema.sql and data.sql files on startup
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql,classpath:data-accounts.sql
spring.sql.init.continue-on-error=true

# Hibernate will not recreate schema but will update if necessary
spring.jpa.hibernate.ddl-auto=update

# SQL logging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Database configuration
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# Thymeleaf configuration
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# Development tools
spring.devtools.livereload.enabled=true
spring.devtools.restart.enabled=true

# URL matching strategy
spring.mvc.pathmatch.matching-strategy=ANT_PATH_MATCHER

