<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication Status</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-8 offset-md-2">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h2>Authentication Status</h2>
                    </div>
                    <div class="card-body">
                        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                        
                        <div th:unless="${error}" class="table-responsive">
                            <table class="table table-bordered">
                                <tbody>
                                    <tr>
                                        <th scope="row">Username</th>
                                        <td th:text="${username}">N/A</td>
                                    </tr>
                                    <tr>
                                        <th scope="row">Authenticated</th>
                                        <td th:text="${authenticated}">N/A</td>
                                    </tr>
                                    <tr>
                                        <th scope="row">Authorities</th>
                                        <td th:text="${authorities}">N/A</td>
                                    </tr>
                                    <tr>
                                        <th scope="row">Principal</th>
                                        <td>
                                            <pre th:text="${principal}" style="white-space: pre-wrap;">N/A</pre>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        
                        <div class="mt-3">
                            <a href="/home" class="btn btn-primary">Go to Home</a>
                            <a href="/login" class="btn btn-secondary">Login Page</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
