<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cars</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/footer.css}">
</head>
<body>
<main class="container mt-4">
  <h2 class="mb-3">All Cars</h2>
  <a class="btn btn-primary mb-3" th:href="@{'/admin/cars/new'}">Add new car</a>

  <table class="table table-hover align-middle">
    <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Year</th>
      <th>Color</th>
      <th>Capacity</th>
      <th>Price</th>
      <th>Status</th>
      <th class="text-center">Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="car : ${cars}">
      <td th:text="${car.carID}"></td>
      <td th:text="${car.carName}"></td>
      <td th:text="${car.carModelYear}"></td>
      <td th:text="${car.color}"></td>
      <td th:text="${car.capacity}"></td>
      <td th:text="${car.rentPrice}"></td>
      <td th:text="${car.status}"></td>
      <td class="text-center">
        <a class="btn btn-sm btn-outline-primary me-1" th:href="@{'/cars/' + ${car.carID}}">View</a>
        <a class="btn btn-sm btn-outline-secondary me-1" th:href="@{'/admin/cars/edit/' + ${car.carID}}">Edit</a>
        <form th:action="@{'/admin/cars/delete/' + ${car.carID}}" method="post" style="display:inline">
          <button class="btn btn-sm btn-outline-danger" type="submit">Delete</button>
        </form>
      </td>
    </tr>
    </tbody>
  </table>

  <nav th:if="${totalPages} > 1">
    <ul class="pagination">
      <li class="page-item" th:classappend="${currentPage == 0}? 'disabled'">
        <a class="page-link" th:href="@{'/cars?(page=' + ${currentPage - 1} + ')'}">Previous</a>
      </li>
      <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages-1)}" th:classappend="${i}==${currentPage}? 'active'">
        <a class="page-link" th:href="@{'/cars?(page=' + ${i} + ')'}" th:text="${i+1}"></a>
      </li>
      <li class="page-item" th:classappend="${currentPage+1>=totalPages}? 'disabled'">
        <a class="page-link" th:href="@{'/cars?(page=' + ${currentPage + 1} + ')'}">Next</a>
      </li>
    </ul>
  </nav>
</main>
  <!-- Footer -->
  <div th:replace="~{html/fragments/footer :: footer}"></div>

  <!-- JavaScript -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
