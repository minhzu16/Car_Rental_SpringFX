<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" th:href="@{/images/fac-ico.webp}" href="/images/fac-ico.webp" />
    <title>BAM - Login</title>
    
    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/general.css}" />
    <link rel="stylesheet" th:href="@{/css/login.css}" />
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    
    <style>
      body {
        background: linear-gradient(135deg, #7c0a02, #d2042d, #e25822);
        overflow-x: hidden;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 1.6rem;
      }
      
      .background {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
      }
      
      .background img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: brightness(0.4);
      }
      
      .login-container {
        position: relative;
        z-index: 2;
        background-color: rgba(255, 255, 255, 0.95);
        box-shadow: 0 1rem 3rem rgba(0, 0, 0, 0.3);
        width: 555px;
        max-width: 90%;
        padding: 2.5rem;
        border-radius: 8px;
        margin: 0 auto;
      }
      
      .brand-name h1 {
        font-size: 2.5rem;
        font-weight: 700;
        margin: 0;
        color: #d2042d;
      }
      
      .brand-name .tagline {
        font-size: 0.9rem;
        color: #666;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-top: -5px;
      }
      
      .form-floating label {
        color: #666;
      }
      
      .form-floating input:focus {
        border-color: #d2042d;
        box-shadow: 0 0 0 0.25rem rgba(210, 4, 45, 0.25);
      }
      
      .btn-login {
        background-color: #d2042d;
        border-color: #d2042d;
        color: white;
        font-weight: 600;
        padding: 0.8rem;
        border-radius: 8px;
        font-size: 1.1rem;
        transition: all 0.3s ease;
      }
      
      .btn-login:hover {
        background-color: #b5032a;
        border-color: #b5032a;
        transform: translateY(-3px);
        box-shadow: 0 5px 15px rgba(210, 4, 45, 0.2);
      }
      
      .register-link {
        color: #d2042d;
        text-decoration: none;
        font-weight: 500;
      }
      
      .register-link:hover {
        text-decoration: underline;
      }
      
      .toggle-password {
        position: absolute;
        top: 50%;
        right: 10px;
        transform: translateY(-50%);
        z-index: 10;
        background: none;
        border: none;
        color: #666;
        cursor: pointer;
      }
      
      .alert {
        margin-bottom: 20px;
        padding: 10px 15px;
        border-radius: 4px;
        font-size: 0.9rem;
      }
      
      .alert-danger {
        color: #721c24;
        background-color: #f8d7da;
        border-color: #f5c6cb;
      }
      
      .alert-success {
        color: #155724;
        background-color: #d4edda;
        border-color: #c3e6cb;
      }
    </style>
  </head>

  <body>
    <div class="background">
      <img th:src="@{../images/car.webp}" src="../images/car.webp" alt="car background" />
    </div>
    
    <div class="login-container">
      <div class="logo-container text-center mb-4">
        <div class="brand-name">
          <h1>BAM</h1>
          <p class="tagline">CAR RENTAL SERVICE</p>
        </div>
      </div>
      
      <h2 class="text-center mb-4">LOGIN</h2>
      
      <!-- Thông báo lỗi hoặc thành công -->
      <div th:if="${error}" class="alert alert-danger mb-4" role="alert">
        <i class="fas fa-exclamation-circle me-2"></i>
        <span th:text="${error}">Error message</span>
      </div>
      <div th:if="${success}" class="alert alert-success mb-4" role="alert">
        <i class="fas fa-check-circle me-2"></i>
        <span th:text="${success}">Success message</span>
      </div>
      
      <form th:action="@{/login}" method="post" class="needs-validation" novalidate>
        <div class="form-floating mb-3">
          <input
            type="text"
            class="form-control"
            id="username"
            name="username"
            placeholder="Username"
            required
          />
          <label for="username">Username</label>
          <div class="invalid-feedback">Please enter your username.</div>
        </div>
        
        <div class="form-floating mb-3 password-container">
          <input
            type="password"
            class="form-control"
            id="password"
            name="password"
            placeholder="Password"
            required
          />
          <label for="password">Password</label>
          <button type="button" class="toggle-password" id="togglePassword">
            <i class="fas fa-eye"></i>
          </button>
          <div class="invalid-feedback">Please enter your password.</div>
        </div>
        
        <div class="d-flex justify-content-between mb-4">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" name="remember-me" id="rememberMe" />
            <label class="form-check-label" for="rememberMe">
              Remember me
            </label>
          </div>
          <a href="#" class="register-link">Forgot password?</a>
        </div>
        
        <button type="submit" class="btn btn-login w-100 mb-3">LOGIN</button>
        
        <p class="text-center">
          Don't have an account? <a href="/register" class="register-link">Register</a>
        </p>
      </form>
    </div>
    
    <!-- Replace the old footer with the new syntax -->
    <div th:replace="~{html/fragments/footer :: footer}"></div>

    <!-- JavaScript -->
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        // Toggle password visibility
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        
        togglePassword.addEventListener('click', function() {
          const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
          passwordInput.setAttribute('type', type);
          this.querySelector('i').classList.toggle('fa-eye');
          this.querySelector('i').classList.toggle('fa-eye-slash');
        });
        
        // Form validation
        const form = document.querySelector('.needs-validation');
        
        form.addEventListener('submit', function(event) {
          if (!form.checkValidity()) {
            event.preventDefault();
            event.stopPropagation();
          }
          
          form.classList.add('was-validated');
        });
        
        // Hiển thị thông báo lỗi/thành công
        const alerts = document.querySelectorAll('.alert');
        alerts.forEach(alert => {
          if (alert.textContent.trim() !== '') {
            setTimeout(() => {
              alert.style.opacity = '0';
              setTimeout(() => {
                alert.style.display = 'none';
              }, 500);
            }, 5000);
          }
        });
      });
    </script>
  </body>
</html>
